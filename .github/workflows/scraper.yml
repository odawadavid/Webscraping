name: Daily Scraper

on:
  schedule:
    - cron: "0 6 * * *"   # Runs daily at 6 AM UTC (9 AM Kenya time)
  workflow_dispatch:       # Allows manual trigger

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies + Playwright browsers
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps

      # 4. Run your scraper pipeline
      - name: Run scraper
        run: |
          python main.py

      # 5. Upload generated CSV files (so they don’t disappear)
      - name: Upload CSV results
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data
          path: |
            *.csv
            data/*.csv

      # 6. (Optional but powerful) Commit updated data back to repo
      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update scraped data" || echo "No changes to commit"
          git push