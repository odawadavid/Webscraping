name: Daily Scraper
on:
  schedule:
    - cron: "0 6 * * *"   # Runs daily at 6 AM UTC (9 AM Kenya time)
  workflow_dispatch:       # Allows manual trigger

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Explicitly allow writing to the repo

    steps:
      # 1. Get your code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # Full history to avoid push conflicts

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install Python dependencies + Playwright
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      # 4. Create data directories
      - name: Create data directories
        run: mkdir -p data/raw data/processed data/history data/analytics

      # 5. Run your scraper pipeline
      - name: Run scraper
        run: python main.py

      # 6. Verify data was generated
      - name: Check generated files
        run: |
          echo "=== Files in data/raw ==="
          ls -lah data/raw/ || echo "No raw data"
          echo "=== Files in data/processed ==="
          ls -lah data/processed/ || echo "No processed data"
          echo "=== Files in data/history ==="
          ls -lah data/history/ || echo "No history data"
          echo "=== Files in data/analytics ==="
          ls -lah data/analytics/ || echo "No analytics data"

      # 7. Upload generated CSV files (for backup)
      - name: Upload CSV results
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data
          path: data/

      # 8. Commit and push results
      #
      # FIX: Added `git pull --rebase origin main` before `git push`.
      #
      # Root cause of the non-fast-forward error:
      #   The runner committed locally, but by the time it tried to push, the
      #   remote main branch had moved ahead (e.g. a previous overlapping run
      #   or a manual push had landed there first).  Git rejected the push
      #   because the local commit's parent no longer matched the remote tip.
      #
      # Why --rebase and not --merge:
      #   --rebase replays the data commit on top of whatever is now on the
      #   remote, keeping a clean linear history.  A merge would add a
      #   pointless "Merge branch 'main'" entry every time the scraper runs.
      #
      # Why this is safe here:
      #   The only file being committed is the data/ directory.  Any remote
      #   change will be to the same CSV files from another scraper run, so
      #   rebase will fast-forward cleanly without conflicts.  If a genuine
      #   conflict did occur, the step fails loudly rather than silently
      #   overwriting anything.
      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage the entire data directory (all files, all subdirectories)
          git add data/

          # Only commit and push if there are actual file changes
          if git diff --staged --quiet; then
            echo "No changes to commit — scraper produced identical output."
          else
            echo "Changes detected, committing the following files:"
            git diff --staged --name-only
            git commit -m "chore: update scraped data $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            # Sync with the remote before pushing so this commit is always
            # a fast-forward, preventing the non-fast-forward rejection.
            git pull --rebase origin main

            git push
            echo "Push successful."
          fi
